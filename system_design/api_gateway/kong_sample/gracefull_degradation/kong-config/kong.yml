_format_version: "3.0"

services:
  - name: main-svc
    url: http://main-app:80
    routes:
      - name: main-route
        paths:
          - /api
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          limit_by: ip
          policy: local
      - name: pre-function
        config:
          access:
            - |
              local original_exit = kong.response.exit
              kong.response.exit = function(status, body, headers)
                if status == 429 then
                  return original_exit(307, nil, {
                    ["Location"] = { "http://localhost:8000/simple" }
                  })
                end
                return original_exit(status, body, headers)
              end

  - name: simple-svc
    url: http://simple-app:80
    routes:
      - name: simple-route
        paths:
          - /simple
        strip_path: true