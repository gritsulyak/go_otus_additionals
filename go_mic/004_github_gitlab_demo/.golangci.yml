version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  # v2: замена issues.exclude-use-default: false
  # Ref: https://golangci-lint.run/docs/product/migration-guide/
  exclusions:
    presets: []   # отключить все встроенные пресеты исключений

formatters:
  enable:
    - gofmt