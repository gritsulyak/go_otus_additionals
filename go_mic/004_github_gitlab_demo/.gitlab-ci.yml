stages:
  - lint
  - test
  - build
  - publish

variables:
  GO_VERSION: "1.22"
  DOCKER_DRIVER: overlay2

lint:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run --timeout=5m ./...
  tags:
    - docker

test:
  stage: test
  image: golang:$GO_VERSION
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/demo?sslmode=disable
  before_script:
    - apt-get update && apt-get install -y postgresql-client
    - psql postgresql://postgres:postgres@postgres:5432/demo -f init.sql
  script:
    - go test -v -race ./...
  tags:
    - docker

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA -f services/api/Dockerfile .
  tags:
    - docker

publish:module:
  stage: publish
  image: golang:$GO_VERSION
  rules:
    - if: $CI_COMMIT_TAG =~ /^libs\/logger\/v.*/
  script:
    - cd libs/logger
    - GOPROXY=proxy.golang.org go list -m github.com/gritsulyak/go_otus_additionals/libs/logger@$CI_COMMIT_TAG
  tags:
    - docker

