name: Docker — 004_github_gitlab_demo

on:
  push:
    branches: ["main"]
    paths:
      - "go_mic/004_github_gitlab_demo/**"
    tags:
      - "go_mic/004_github_gitlab_demo/v*"
  pull_request:
    branches: ["main"]
    paths:
      - "go_mic/004_github_gitlab_demo/**"

defaults:
  run:
    working-directory: go_mic/004_github_gitlab_demo

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/004-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: go_mic/004_github_gitlab_demo
          file: go_mic/004_github_gitlab_demo/services/api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHE_BUST=${{ github.sha }}

