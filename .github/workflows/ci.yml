name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "go_mic/004_github_gitlab_demo/**"
  pull_request:
    branches: ["main"]
    paths:
      - "go_mic/004_github_gitlab_demo/**"

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go_mic/004_github_gitlab_demo/libs/logger/go.mod
          cache: true
          cache-dependency-path: |
            go_mic/004_github_gitlab_demo/libs/logger/go.sum
            go_mic/004_github_gitlab_demo/services/api/go.sum

      - name: Tidy libs/logger
        working-directory: go_mic/004_github_gitlab_demo/libs/logger
        run: go mod tidy

      - name: Tidy services/api
        working-directory: go_mic/004_github_gitlab_demo/services/api
        run: go mod tidy

      - name: Format check
        working-directory: go_mic/004_github_gitlab_demo
        run: test -z "$(gofmt -l libs/logger services/api)"

      - name: Lint libs/logger
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go_mic/004_github_gitlab_demo/libs/logger

      - name: Lint services/api
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go_mic/004_github_gitlab_demo/services/api

      - name: Test libs/logger
        working-directory: go_mic/004_github_gitlab_demo/libs/logger
        run: go test -v -race ./...

      - name: Test services/api
        working-directory: go_mic/004_github_gitlab_demo/services/api
        run: go test -v -race ./...